name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.11'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: knowledge_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client and pgvector
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          # Install pgvector extension
          sudo apt-get install -y postgresql-15-pgvector || echo "pgvector not available in apt"

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install UV
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e .
          uv pip install pytest pytest-cov pytest-asyncio mypy ruff

      - name: Setup test database
        run: |
          PGPASSWORD=postgres createdb -h localhost -U postgres knowledge_test_actual || true
          PGPASSWORD=postgres psql -h localhost -U postgres knowledge_test_actual -c "CREATE EXTENSION IF NOT EXISTS vector;" || echo "vector extension not available"
        env:
          PGPASSWORD: postgres

      - name: Lint with ruff
        run: uv run ruff check src/ tests/

      - name: Type check with mypy
        run: uv run mypy src/ --ignore-missing-imports

      - name: Run tests
        run: uv run pytest tests/ -v --cov=src --cov-report=xml --cov-report=term
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost/knowledge_test_actual
          PYTHONPATH: src

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false

  test-json-fallback:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install UV
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e .
          uv pip install pytest pytest-asyncio

      - name: Test JSON fallback mode
        run: uv run pytest tests/ -v -k "json or fallback" || echo "No JSON-specific tests found"
        env:
          KNOWLEDGE_DATA_DIR: /tmp/knowledge_test_json
          PYTHONPATH: src